version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: verve-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - verve-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: verve-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    # ✅ Healthcheck so server waits for Kafka to be truly ready
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - verve-network

  redis:
    image: redis/redis-stack:latest
    container_name: verve-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - verve-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: verve-server
    # ✅ Wait for kafka to be healthy, not just started
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      CLIENT_APP_URL: http://localhost:3000
      APP_URL: http://localhost:8000
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: chats
      REDIS_URL: redis://verve-redis:6379
      NODE_ENV: production
    networks:
      - verve-network
    restart: unless-stopped

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      # ✅ NEXT_PUBLIC_* must be passed at build time, not runtime
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    container_name: verve-front
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # ✅ Server-side calls from frontend container → backend container
      BACKEND_INTERNAL_URL: http://verve-server:8000
      NODE_ENV: production
    networks:
      - verve-network
    restart: unless-stopped

networks:
  verve-network:
    driver: bridge